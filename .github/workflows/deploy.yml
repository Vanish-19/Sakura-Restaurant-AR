name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  DEPLOY_ROOT: /var/www/sakura
  SSH_PORT: ${{ secrets.VPS_PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            Fe/package-lock.json
            Be/package-lock.json

      - name: Build frontend
        working-directory: Fe
        env:
          VITE_API_BASE_URL: /api/v1
        run: |
          npm ci
          npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '$DEPLOY_ROOT/fe' '$DEPLOY_ROOT/be'"

      - name: Upload frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            Fe/dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$DEPLOY_ROOT/fe/"

      - name: Upload backend
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude .env \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            Be/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$DEPLOY_ROOT/be/"

      - name: Install backend dependencies and restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '$DEPLOY_ROOT/be' && npm ci --omit=dev && pm2 startOrReload ecosystem.config.cjs --env production && pm2 save"
